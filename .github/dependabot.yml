# Dependabot — deliberately configured for a pinned reference implementation.
#
# `open-pull-requests-limit: 0` switches OFF *version-update* pull requests (the routine
# "bump X from 1.2 to 1.3" noise). That is intentional, not neglect: this repository is a
# reference implementation pinned to a dependency set the CI suite was validated against, not
# a library under active maintenance. Left on, the bumps pile up unreviewed — which reads far
# worse than a clean tree, and would quietly drift the stack away from the versions the 165
# tests actually cover.
#
# What stays ON is the part that matters: **Dependabot security updates and alerts** (a
# separate repository setting) still raise a pull request when a dependency carries an actual
# advisory. Real vulnerabilities get a PR; cosmetic bumps do not.
#
# To resume routine updates, raise the limit (5 is a sane value) and prefer `interval: monthly`
# with `groups:` so an ecosystem arrives as one reviewable PR instead of a dozen.
version: 2
updates:
  # --- Python dependencies (root) ---
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"

  # --- Python dependencies (mock generators) ---
  - package-ecosystem: "pip"
    directory: "/src/mock_generator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"

  # --- GitHub Actions workflow dependencies ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "ci"

  # --- Terraform providers & modules (all five layers + the shared modules) ---
  - package-ecosystem: "terraform"
    directory: "/terraform/01_infra"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/02_workspace"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/03_unity_catalog"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/04_grafana"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/05_grafana_content"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "terraform"
