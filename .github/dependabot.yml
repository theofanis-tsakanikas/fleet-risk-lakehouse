version: 2
updates:
  # --- Python dependencies (root) ---
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # --- Python dependencies (mock generators) ---
  - package-ecosystem: "pip"
    directory: "/src/mock_generator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # --- GitHub Actions workflow dependencies ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # --- Terraform providers & modules ---
  - package-ecosystem: "terraform"
    directory: "/terraform/01_infra"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/02_workspace"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/03_unity_catalog"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "terraform"
