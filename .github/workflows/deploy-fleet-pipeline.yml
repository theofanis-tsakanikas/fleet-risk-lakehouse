name: "Deploy Infrastructure & Pipeline"

# --- 🚀 TRIGGER CONFIGURATION ---
# Manual-only. This job runs a live `terraform apply` against real AWS/Databricks,
# so it is deliberately NOT triggered on push to main — a doc/code merge must never
# deploy infrastructure. Run it by hand from the Actions tab when you intend to deploy.
on:
  # Manual triggering from the GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write   # OIDC token for aws-actions/configure-aws-credentials
  contents: read

jobs:
  # --- 🏗️ JOB 1: INFRASTRUCTURE DEPLOYMENT (TERRAFORM) ---
  infrastructure:
    name: "1. Terraform Deployment"
    runs-on: ubuntu-latest

    # Define outputs to pass data (SPN id + workspace URL) to subsequent jobs
    outputs:
      project_spn_id: ${{ steps.get_outputs.outputs.SPN_ID }}
      workspace_url: ${{ steps.get_outputs.outputs.WORKSPACE_URL }}
    
    # Deploy is manual-only (workflow_dispatch is the sole trigger). A required-reviewer
    # gate on this `production` environment needs GitHub Pro+ for private repos; until
    # then the safety control is that the workflow only ever runs when launched by hand.
    environment: production

    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      # Real AWS account id for the IAM trust policies (the committed .tf default is a placeholder).
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      # Mapping Admin Secrets to Terraform-recognized variables (TF_VAR_ prefix)
      TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
      TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_ADMIN_CLIENT_ID }}
      TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_ADMIN_CLIENT_SECRET }}
      # No DATABRICKS_HOST here: layer 01 creates the workspace, and its providers set their
      # host explicitly (account provider → accounts.cloud.databricks.com; layers 02/03 read
      # workspace_url from remote state). The URL is derived below and handed to the deploy job.

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials (OIDC — no long-lived keys)"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: "Read Pinned Terraform Version"
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: "Setup Terraform Engine (pinned)"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: "Execute Terraform Layers"
        working-directory: .
        run: |

          # Ensure the automation script is executable
          chmod +x terraform.sh
          
          # Deploy all three infrastructure layers sequentially
          ./terraform.sh 01_infra apply
          ./terraform.sh 02_workspace apply
          ./terraform.sh 03_unity_catalog apply

      - name: "Extract Terraform Outputs (SPN id + workspace URL)"
        id: get_outputs
        working-directory: .
        run: |

          # The workspace URL only exists after 01_infra creates the workspace, so we derive it
          # here and pass it to the deploy job as an output — no manual DATABRICKS_HOST secret to
          # copy-paste after every apply. Strip any hidden characters from both values.
          ID=$(terraform -chdir=terraform/01_infra output -raw spn_application_id | tr -d '[:space:]')
          HOST=$(terraform -chdir=terraform/01_infra output -raw workspace_url | tr -d '[:space:]')

          if [ -z "$ID" ] || [ -z "$HOST" ]; then
            echo "❌ ERROR: Could not fetch SPN id / workspace URL from Terraform outputs"
            exit 1
          fi

          echo "Extracted SPN: $ID"
          echo "Extracted workspace URL: $HOST"
          echo "SPN_ID=$ID" >> "$GITHUB_OUTPUT"
          echo "WORKSPACE_URL=$HOST" >> "$GITHUB_OUTPUT"


  # --- 📦 JOB 2: DATABRICKS ASSET BUNDLE DEPLOY ---
  deploy_bundle:
    name: "2. Databricks Asset Bundle Deploy"
    # This job only runs if the 'infrastructure' job completes successfully
    needs: infrastructure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Databricks CLI"
        # Pinned to the v1.5.0 commit SHA — a mutable ref (@main) in a workflow that
        # holds cloud credentials is a supply-chain risk.
        uses: databricks/setup-cli@f01853f8d6b12678ab0fab76ffad726c460be1a5 # v1.5.0

      - name: "Deploy Bundle via Hybrid Script"
        env:
          # Inject the SPN ID + workspace URL from the Infrastructure Job into the environment.
          # The bundle.sh script detects these and skips its local Terraform fetching.
          SPN_ID: ${{ needs.infrastructure.outputs.project_spn_id }}
          # Derived from the Terraform output by job 1 — no manual DATABRICKS_HOST secret needed.
          DATABRICKS_HOST: ${{ needs.infrastructure.outputs.workspace_url }}
          
          # Use Admin credentials for the deployment process itself
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_ADMIN_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_ADMIN_CLIENT_SECRET }}
          # Alerting: baked into the Gold task at deploy time (empty/unset => no-op)
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PAGERDUTY_ROUTING_KEY: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
        run: |

          # Ensure the bundle orchestration script is executable
          chmod +x bundle.sh
          
          # Run the bundle deployment
          # This automatically handles variable-overrides.json creation
          ./bundle.sh deploy