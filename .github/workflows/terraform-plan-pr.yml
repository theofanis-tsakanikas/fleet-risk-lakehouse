name: "Terraform Plan (Pull Request)"

# Runs on every PR targeting main that touches Terraform or orchestration files.
# Posts a sticky comment per layer — updated in place on each new push to the PR.
# Fork guard: skips all jobs if the PR originates from a fork (secrets are not
# available to forks and would produce misleading empty-plan output).

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "*.sh"
      - "databricks.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write   # OIDC token for aws-actions/configure-aws-credentials
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # JOB 1: Plan 01_infra
  # Outputs the Secrets Manager ARN so jobs 2 and 3 can inject SPN credentials
  # without re-initializing layer 01.
  # ============================================================================
  plan-01-infra:
    name: "Plan: 01_infra"
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    outputs:
      secrets_manager_id: ${{ steps.tf-outputs.outputs.secrets_manager_id }}

    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
      TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_ADMIN_CLIENT_ID }}
      TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_ADMIN_CLIENT_SECRET }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Configure AWS Credentials (OIDC — no long-lived keys)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: "Read Pinned Terraform Version"
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: "Setup Terraform (pinned)"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: "Terraform Init"
        working-directory: terraform/01_infra
        run: terraform init -input=false

      - name: "Terraform Plan"
        id: plan
        working-directory: terraform/01_infra
        shell: bash
        run: terraform plan -input=false -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: "Extract Secrets Manager ARN"
        id: tf-outputs
        working-directory: terraform/01_infra
        run: |
          ID=$(terraform output -raw secrets_manager_id 2>/dev/null | tr -d '[:space:]' || echo "")
          echo "secrets_manager_id=$ID" >> "$GITHUB_OUTPUT"

      - name: "Format Plan Comment"
        run: |
          {
            echo "## Terraform Plan: \`01_infra\`"
            echo ""
            echo "<details><summary>Show Plan Output</summary>"
            echo ""
            echo "\`\`\`hcl"
            cat terraform/01_infra/plan.txt
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > plan-comment-01.md

      - name: "Post Sticky PR Comment"
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plan-01-infra
          path: plan-comment-01.md

      - name: "Fail Job if Plan Failed"
        # The plan step uses continue-on-error so the sticky comment is always
        # posted; this step propagates the real plan result to the PR check.
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed for 01_infra — see the sticky comment for details."
          exit 1

  # ============================================================================
  # JOB 2: Plan 02_workspace
  # Reads remote state from 01_infra (workspace_url, metastore_id).
  # Injects SPN credentials fetched from the Secrets Manager ARN passed by job 1.
  # ============================================================================
  plan-02-workspace:
    name: "Plan: 02_workspace"
    needs: plan-01-infra
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Configure AWS Credentials (OIDC — no long-lived keys)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: "Read Pinned Terraform Version"
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: "Setup Terraform (pinned)"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: "Inject SPN Credentials from Secrets Manager"
        env:
          SECRET_ARN: ${{ needs.plan-01-infra.outputs.secrets_manager_id }}
        run: |
          if [ -z "$SECRET_ARN" ]; then
            echo "⚠️  No Secrets Manager ARN from 01_infra — SPN credentials will be empty."
            echo "   Ensure 01_infra has been applied at least once before running plans for this layer."
          else
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_ARN" \
              --query SecretString \
              --output text 2>/dev/null || echo "")
            if [ -n "$SECRET_JSON" ]; then
              echo "TF_VAR_spn_client_id=$(echo "$SECRET_JSON" | jq -r .spn_client_id)" >> "$GITHUB_ENV"
              echo "TF_VAR_spn_client_secret=$(echo "$SECRET_JSON" | jq -r .spn_client_secret)" >> "$GITHUB_ENV"
              echo "✅ SPN credentials injected."
            else
              echo "⚠️  Could not retrieve secret from Secrets Manager."
            fi
          fi

      - name: "Terraform Init"
        working-directory: terraform/02_workspace
        run: terraform init -input=false

      - name: "Terraform Plan"
        id: plan
        working-directory: terraform/02_workspace
        shell: bash
        run: terraform plan -input=false -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: "Format Plan Comment"
        run: |
          {
            echo "## Terraform Plan: \`02_workspace\`"
            echo ""
            echo "<details><summary>Show Plan Output</summary>"
            echo ""
            echo "\`\`\`hcl"
            cat terraform/02_workspace/plan.txt
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > plan-comment-02.md

      - name: "Post Sticky PR Comment"
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plan-02-workspace
          path: plan-comment-02.md

      - name: "Fail Job if Plan Failed"
        # The plan step uses continue-on-error so the sticky comment is always
        # posted; this step propagates the real plan result to the PR check.
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed for 02_workspace — see the sticky comment for details."
          exit 1

  # ============================================================================
  # JOB 3: Plan 03_unity_catalog
  # Reads remote state from 01_infra (datalake_role_arn, data_bucket_id).
  # Depends on both prior jobs: waits for 02 to finish, reads ARN output from 01.
  # ============================================================================
  plan-03-unity-catalog:
    name: "Plan: 03_unity_catalog"
    needs: [plan-01-infra, plan-02-workspace]
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Configure AWS Credentials (OIDC — no long-lived keys)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: "Read Pinned Terraform Version"
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: "Setup Terraform (pinned)"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: "Inject SPN Credentials from Secrets Manager"
        env:
          SECRET_ARN: ${{ needs.plan-01-infra.outputs.secrets_manager_id }}
        run: |
          if [ -z "$SECRET_ARN" ]; then
            echo "⚠️  No Secrets Manager ARN from 01_infra — SPN credentials will be empty."
            echo "   Ensure 01_infra has been applied at least once before running plans for this layer."
          else
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_ARN" \
              --query SecretString \
              --output text 2>/dev/null || echo "")
            if [ -n "$SECRET_JSON" ]; then
              echo "TF_VAR_spn_client_id=$(echo "$SECRET_JSON" | jq -r .spn_client_id)" >> "$GITHUB_ENV"
              echo "TF_VAR_spn_client_secret=$(echo "$SECRET_JSON" | jq -r .spn_client_secret)" >> "$GITHUB_ENV"
              echo "✅ SPN credentials injected."
            else
              echo "⚠️  Could not retrieve secret from Secrets Manager."
            fi
          fi

      - name: "Terraform Init"
        working-directory: terraform/03_unity_catalog
        run: terraform init -input=false

      - name: "Terraform Plan"
        id: plan
        working-directory: terraform/03_unity_catalog
        shell: bash
        run: terraform plan -input=false -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: "Format Plan Comment"
        run: |
          {
            echo "## Terraform Plan: \`03_unity_catalog\`"
            echo ""
            echo "<details><summary>Show Plan Output</summary>"
            echo ""
            echo "\`\`\`hcl"
            cat terraform/03_unity_catalog/plan.txt
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > plan-comment-03.md

      - name: "Post Sticky PR Comment"
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plan-03-unity-catalog
          path: plan-comment-03.md

      - name: "Fail Job if Plan Failed"
        # The plan step uses continue-on-error so the sticky comment is always
        # posted; this step propagates the real plan result to the PR check.
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed for 03_unity_catalog — see the sticky comment for details."
          exit 1
