repos:
  # ---------------------------------------------------------------------------
  # Terraform: format and validate all 3 layers
  # terraform_validate runs with -backend=false (no live backend needed), but
  # providers must be downloaded first — run `./terraform.sh <layer> init` once
  # per layer before using pre-commit for the first time.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --args=-no-color

  # ---------------------------------------------------------------------------
  # Python: ruff as BOTH linter and formatter (same tool + line-length=120 as
  # `make fmt` / CI — a second formatter like black at its default 88 would
  # fight ruff-format and flip files back and forth).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(notebooks|src)/
      - id: ruff-format
        # Same scope as the Makefile's FMT_SCOPE (`make fmt-check` / CI) — the
        # notebooks and producer scripts are deliberately not format-enforced.
        files: ^(src/(fleet_transforms|fleet_governance|replay)/|src/mock_generator/generators\.py|tests/)

  # ---------------------------------------------------------------------------
  # Secret scanning — blocks credentials/keys from being committed
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
