repos:
  # ---------------------------------------------------------------------------
  # Terraform: format and validate all 3 layers
  # terraform_validate runs with -backend=false (no live backend needed), but
  # providers must be downloaded first — run `./terraform.sh <layer> init` once
  # per layer before using pre-commit for the first time.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --args=-no-color

  # ---------------------------------------------------------------------------
  # Python: formatter (black) and linter (ruff) scoped to notebooks and src
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        files: ^(notebooks|src)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(notebooks|src)/

  # ---------------------------------------------------------------------------
  # Secret scanning — blocks credentials/keys from being committed
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
