# Streamlit theme for the Fleet Safety Command Center.
#
# Matches the dark cyan branding of the multi-cloud-self-healing-agent UI so the
# portfolio reads as one coherent product suite. The app ships custom dark CSS,
# so we force the dark base — light mode half-applies and looks broken.

[theme]
base                     = "dark"
primaryColor             = "#38bdf8"
backgroundColor          = "#070e20"
secondaryBackgroundColor = "#0d1b35"
textColor                = "#e2e8f0"

[client]
# Hide Streamlit's own Deploy button + dev menu items for a clean demo, while
# keeping Rerun/Settings available in the ⋮ menu.
toolbarMode = "viewer"
